name: Release

on:
  push:
    branches:
      - main
      - develop

jobs:
  version:
    runs-on: ubuntu-latest

    outputs:
      version_number: ${{ steps.versioning.outputs.version_number }}
      new_version: ${{ steps.versioning.outputs.new_version }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Limpar cache npm
        run: npm cache clean --force

      - name: Instalar dependências
        run: npm install

      - name: Rodar build
        run: npm run build

      - name: Testes unitários
        run: npm test

      - name: Instalar SemVer
        run: npm install -g semver

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Criar TAG inicial (se não existir)
        run: |
          if [ -z "$(git tag)" ]; then
            git tag v0.0.1
            git push origin v0.0.1
          fi

      - name: Calcular nova versão
        id: versioning
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          echo "Última tag: $LAST_TAG"

          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"

          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|^BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          CURRENT=${LAST_TAG#v}
          NEW_VERSION=$(semver -i $BUMP $CURRENT)

          echo "Nova versão: v${NEW_VERSION}"

          echo "new_version=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "bump=${BUMP}" >> $GITHUB_OUTPUT

      - name: Atualizar package.json
        run: |
          NEW_VERSION=${{ steps.versioning.outputs.new_version }}
          VERSION_NUMBER=${NEW_VERSION#v}

          npm version $VERSION_NUMBER --no-git-tag-version

          git add package.json package-lock.json

          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]" || echo "Nada para commitar"

      - name: Criar e publicar TAG
        run: |
          NEW_VERSION=${{ steps.versioning.outputs.new_version }}

          git tag $NEW_VERSION
          git push origin HEAD:${{ github.ref_name }}
          git push origin $NEW_VERSION

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Enviar e-mail em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Falha no pipeline - ${{ github.repository }}"
          body: |
            O pipeline falhou no repositório ${{ github.repository }}.

            Acesse:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Enviar e-mail em caso de sucesso
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Sucesso no pipeline - ${{ github.repository }}"
          body: |
            Pipeline concluído com sucesso!

            Nova versão:
            ${{ steps.versioning.outputs.new_version }}

            Acesse:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Discord - Falha
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Pipeline falhou",
                "color": 15158332,
                "fields": [
                  { "name": "Repositório", "value": "${{ github.repository }}", "inline": true },
                  { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                  { "name": "Autor", "value": "${{ github.actor }}", "inline": true }
                ]
              }]
            }'

      - name: Discord - Sucesso
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Pipeline concluída com sucesso",
                "color": 3066993,
                "fields": [
                  { "name": "Versão", "value": "${{ steps.versioning.outputs.new_version }}", "inline": true },
                  { "name": "Autor", "value": "${{ github.actor }}", "inline": true }
                ]
              }]
            }'

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: [version]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Definir repositório Docker
        id: repo
        run: |
          REPO_NAME="${{ secrets.DOCKERHUB_USERNAME }}/pet-joyful-backend"
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Build da imagem Docker
        run: |
          NEW_VERSION=${{ needs.version.outputs.version_number }}
          REPO_NAME=${{ steps.repo.outputs.repo_name }}

          docker build \
            --tag ${REPO_NAME}:${NEW_VERSION} \
            --tag ${REPO_NAME}:latest .

      - name: Push Docker
        run: |
          NEW_VERSION=${{ needs.version.outputs.version_number }}
          REPO_NAME=${{ steps.repo.outputs.repo_name }}

          docker push ${REPO_NAME}:${NEW_VERSION}
          docker push ${REPO_NAME}:latest

  deploy-hml:
    name: CD - Deploy HML
    runs-on: ubuntu-latest
    needs: [version, docker-build]

    if: |
      needs.version.outputs.version_number != '' &&
      (github.ref_name == 'develop' || github.ref_name == 'main')

    environment: hml

    steps:
      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validar secrets
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "RENDER_API_KEY não definido"
            exit 1
          fi

      - name: Deploy HML via Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: srv-d87p8krbc2fs73e7hjs0
          NEW_VERSION: ${{ needs.version.outputs.version_number }}

        run: |
          set -euo pipefail

          PAYLOAD=$(jq -n \
            --arg image "docker.io/joaovitorjesus/pet-joyful-backend:${NEW_VERSION}" \
            '{
              clearCache: "clear",
              imageUrl: $image,
              overrideImage: true,
              imagePullPolicy: "Always"
            }')

          curl -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d "$PAYLOAD"

  deploy-prod:
    name: CD - Deploy PROD
    runs-on: ubuntu-latest
    needs: [version, deploy-hml]

    if: |
      needs.version.outputs.version_number != '' &&
      github.ref_name == 'main'

    environment: prod

    steps:
      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validar secrets
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "RENDER_API_KEY não definido"
            exit 1
          fi

      - name: Deploy PROD via Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: srv-d6rjffia214c73bi1r8g
          NEW_VERSION: ${{ needs.version.outputs.version_number }}

        run: |
          set -euo pipefail

          PAYLOAD=$(jq -n \
            --arg image "docker.io/joaovitorjesus/pet-joyful-backend:${NEW_VERSION}" \
            '{
              clearCache: "clear",
              imageUrl: $image,
              overrideImage: true,
              imagePullPolicy: "Always"
            }')

          curl -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d "$PAYLOAD"

      - name: Discord - Deploy PROD concluído
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚀 Deploy PROD concluído",
                "color": 3066993,
                "fields": [
                  { "name": "Versão", "value": "${{ needs.version.outputs.new_version }}", "inline": true },
                  { "name": "Autor", "value": "${{ github.actor }}", "inline": true }
                ]
              }]
            }'