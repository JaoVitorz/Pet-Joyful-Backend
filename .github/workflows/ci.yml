name: Release

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: limpar cache npm
        run: npm cache clean --force 

      - name: Instalar dependências
        run: npm install

      - name: Rodar build
        run: npm run build

      - name: Testes unitarios
        run: npm test

      #PARTE 2 - Versionamento automático SemVer.
      - name: Instalar SemVer
        run: npm install -g semver

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Criar nova TAG inicial (se não existir nenhuma)
        run: |
          if [ -z "$(git tag)" ]; then
            git tag v0.0.1
            git push origin v0.0.1
          fi

      - name: Calcular nova versão
        id: versioning
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Última tag: $LAST_TAG"

          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|^BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          CURRENT=${LAST_TAG#v}
          NEW_VERSION=$(semver -i $BUMP $CURRENT)
          echo "Nova versão: v${NEW_VERSION}"
          echo "new_version=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "bump=${BUMP}" >> $GITHUB_OUTPUT

      - name: Atualizar package.json
        run: |
          NEW_VERSION=${{ steps.versioning.outputs.new_version }}
          VERSION_NUMBER=${NEW_VERSION#v}
          npm version $VERSION_NUMBER --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]" || echo "Nada para commitar"

      - name: Criar e publicar nova TAG
        run: |
          NEW_VERSION=${{ steps.versioning.outputs.new_version }}
          git tag $NEW_VERSION
          git push origin HEAD:main
          git push origin $NEW_VERSION

      # PARTE 3 - Notificação por e-mail
      - name: Enviar e-mail em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Falha no pipeline - ${{ github.repository }}"
          body: |
            O pipeline falhou no repositório ${{ github.repository }}.
            Acesse os detalhes em: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Enviar e-mail em caso de sucesso
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Sucesso no pipeline - ${{ github.repository }}"
          body: |
            O pipeline foi concluído com sucesso!
            Nova versão liberada: ${{ steps.versioning.outputs.new_version }}
            Acesse os detalhes em: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}

      # PARTE 4 - Notificação pelo Discord
      - name: Enviar notificação no Discord em caso de falha
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Pipeline falhou",
                "color": 15158332,
                "fields": [
                  { "name": "Repositório", "value": "${{ github.repository }}", "inline": true },
                  { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                  { "name": "Autor", "value": "${{ github.actor }}", "inline": true },
                  { "name": "Commit", "value": "`${{ github.sha }}`", "inline": false },
                  { "name": "Ver detalhes", "value": "[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
                ],
                "footer": { "text": "GitHub Actions • Pet Joyful Backend" },
                "timestamp": "${{ github.event.head_commit.timestamp }}"
              }]
            }'

      - name: Enviar notificação no Discord em caso de sucesso
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Pipeline concluída com sucesso",
                "color": 3066993,
                "fields": [
                  { "name": "Repositório", "value": "${{ github.repository }}", "inline": true },
                  { "name": "Versão", "value": "`${{ steps.versioning.outputs.new_version }}`", "inline": true },
                  { "name": "Autor", "value": "${{ github.actor }}", "inline": true },
                  { "name": "Ver detalhes", "value": "[Execução #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
                ],
                "footer": { "text": "GitHub Actions • Pet Joyful Backend" },
                "timestamp": "${{ github.event.head_commit.timestamp }}"
              }]
            }'

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: [version]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker - backend
        run: |
          docker build \
            --tag pet-joyful-backend:${{ github.sha }} \
            --tag pet-joyful-backend:latest \
            .

      - name: Verificar imagem gerada
        run: docker images pet-joyful-backend